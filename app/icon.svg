<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Southport Pier">
  <rect width="64" height="64" rx="12" fill="#0f3b3a"/>
  <!-- deck -->
  <rect x="8" y="26" width="48" height="5" fill="#e9dcc3"/>
  <!-- pier legs -->
  <g fill="#e9dcc3">
    <rect x="13" y="31" width="3" height="22"/>
    <rect x="24" y="31" width="3" height="22"/>
    <rect x="35" y="31" width="3" height="22"/>
    <rect x="46" y="31" width="3" height="22"/>
  </g>
  <!-- cross-braces -->
  <g stroke="#c9b892" stroke-width="1.6">
    <line x1="14.5" y1="33" x2="25.5" y2="44"/>
    <line x1="25.5" y1="33" x2="14.5" y2="44"/>
    <line x1="36.5" y1="33" x2="47.5" y2="44"/>
    <line x1="47.5" y1="33" x2="36.5" y2="44"/>
  </g>
  <!-- sun over the sands -->
  <circle cx="32" cy="17" r="6" fill="#d98a3d"/>
</svg>
